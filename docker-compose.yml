# nur — deployable threat intel sharing stack
#
# Quick start:
#   docker compose up
#
# Production (PostgreSQL):
#   docker compose --profile production up
#
# With live feed ingestion:
#   NUR_AUTO_INGEST=1 docker compose up
#
# With API key auth:
#   NUR_API_KEY=your-secret docker compose up

services:
  nur:
    build: .
    ports:
      - "${NUR_PORT:-8000}:8000"
    environment:
      - NUR_DB_URL=${NUR_DB_URL:-sqlite+aiosqlite:///data/nur.db}
      - NUR_API_KEY=${NUR_API_KEY:-}
      - NUR_MIN_K=${NUR_MIN_K:-3}
      - NUR_AUTO_INGEST=${NUR_AUTO_INGEST:-0}
    volumes:
      - nur-data:/app/data
    restart: unless-stopped

  # ── Production: PostgreSQL backend ────────────────────────────
  nur-prod:
    build: .
    ports:
      - "${NUR_PORT:-8000}:8000"
    environment:
      - NUR_DB_URL=postgresql+asyncpg://nur:${POSTGRES_PASSWORD:-nur}@postgres:5432/nur
      - NUR_API_KEY=${NUR_API_KEY:-}
      - NUR_MIN_K=${NUR_MIN_K:-3}
      - NUR_AUTO_INGEST=${NUR_AUTO_INGEST:-1}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - production

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nur
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nur}
      POSTGRES_DB: nur
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nur"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - production

volumes:
  nur-data:
  pg-data:
