name: Build & Push & Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'release' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /home/admin/nur
            docker compose pull nur
            docker compose up -d nur
            echo "Waiting 90s for app startup..."
            sleep 90
            docker restart nur-caddy-1
            sleep 15
            # Verify
            for i in 1 2 3 4 5; do
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:80/health || echo "000")
              if [ "$HTTP" = "200" ] || [ "$HTTP" = "308" ]; then
                echo "Deploy verified: HTTP $HTTP"
                exit 0
              fi
              echo "Attempt $i: HTTP $HTTP, waiting..."
              sleep 10
            done
            echo "WARNING: Deploy may not be healthy yet"
