name: Build & Push & Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'release' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /home/admin/nur

            # Save current image digest for rollback
            PREV_IMAGE=$(docker inspect --format='{{.Image}}' nur-nur-1 2>/dev/null || echo "")
            echo "Previous image: $PREV_IMAGE"

            # Pull and deploy new image
            docker compose pull nur
            docker compose up -d nur
            echo "Waiting 90s for app startup..."
            sleep 90
            docker restart nur-caddy-1
            sleep 15

            # Verify health
            HEALTHY=false
            for i in 1 2 3 4 5; do
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:80/health || echo "000")
              if [ "$HTTP" = "200" ] || [ "$HTTP" = "308" ]; then
                echo "Deploy verified: HTTP $HTTP"
                HEALTHY=true
                break
              fi
              echo "Attempt $i: HTTP $HTTP, waiting..."
              sleep 10
            done

            # Rollback if unhealthy
            if [ "$HEALTHY" = "false" ]; then
              echo "ERROR: Deploy health check failed!"
              if [ -n "$PREV_IMAGE" ]; then
                echo "Rolling back to previous image..."
                docker compose down nur
                docker compose up -d nur
                sleep 30
                docker restart nur-caddy-1
                echo "Rollback attempted. Check manually."
              fi
              exit 1
            fi
